project:
  type: website
  output-dir: _site
  resources:
    - downloads/*.xlsx
    - downloads/*.csv

website:
  title: "Monitor de Proyectos RIGI"
  page-footer:
    left: "Generado automáticamente con R y Quarto."
    right: "Fuente: solapa Proyectos del archivo Excel del tracker RIGI."
  navbar:
    background: "#0B132B"
    foreground: "#FFFFFF"
    left:
      - href: index.qmd
        text: Informe
      - href: presentation.qmd
        text: Presentación

format:
  html:
    theme:
      - cosmo
    css: styles.css
    toc: true
    toc-location: left
    toc-depth: 3
    page-layout: full
    code-fold: true
    code-tools: false
    smooth-scroll: true

execute:
  echo: false
  warning: false
  message: false
